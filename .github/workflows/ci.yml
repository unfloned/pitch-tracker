name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm install --no-fund --no-audit --legacy-peer-deps
            - run: npm test
            - run: npm run build
