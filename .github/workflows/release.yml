name: Release

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [macos-latest, windows-latest, ubuntu-latest]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install
              run: npm install --no-fund --no-audit

            - name: Build (renderer + main + preload)
              run: npm run build

            - name: Package macOS (dmg, signed + notarized)
              if: matrix.os == 'macos-latest'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
                  CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              run: npx electron-builder --mac --publish always

            - name: Package Windows (nsis)
              if: matrix.os == 'windows-latest'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx electron-builder --win --publish always

            - name: Package Linux (AppImage)
              if: matrix.os == 'ubuntu-latest'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx electron-builder --linux --publish always

    release-notes:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Extract version
              id: version
              run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

            - name: Extract changelog section
              id: changelog
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  awk -v v="$VERSION" '
                    /^## / {
                        if (found) exit
                        if ($2 == v || $2 == "v"v) { found = 1; next }
                    }
                    found { print }
                  ' CHANGELOG.md > RELEASE_NOTES.md
                  if [ ! -s RELEASE_NOTES.md ]; then
                      echo "Release $VERSION" > RELEASE_NOTES.md
                  fi
                  echo "---"
                  cat RELEASE_NOTES.md

            - name: Update release with changelog
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  gh release edit "v$VERSION" \
                      --repo "$GITHUB_REPOSITORY" \
                      --notes-file RELEASE_NOTES.md \
                      --draft=false || echo "Release not yet created, skipping"
